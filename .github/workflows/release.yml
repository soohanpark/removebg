name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # setuptools-scm needs full history + tags to compute the version
          # during the editable install performed by `uv sync`.
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run pytest
        run: uv run --python ${{ matrix.python-version }} pytest -q

      - name: Smoke-test CLI
        run: uv run --python ${{ matrix.python-version }} nobg --version

  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # setuptools-scm derives the version from the git tag, so we need
          # full history and tags.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify built version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          wheel=$(ls dist/nobg-*.whl | head -1)
          built=$(basename "$wheel" | sed -E 's/^nobg-([^-]+)-.*/\1/')
          if [ "$tag" != "$built" ]; then
            echo "::error::tag v$tag does not match built wheel version $built. Did setuptools-scm pick up an unexpected commit?"
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build release notes
        id: notes
        run: |
          {
            echo 'body<<EOF'
            echo "## Install"
            echo
            echo '```bash'
            echo "uv tool install git+https://github.com/${GITHUB_REPOSITORY}.git@${GITHUB_REF_NAME}"
            echo "# or: pipx install git+https://github.com/${GITHUB_REPOSITORY}.git@${GITHUB_REF_NAME}"
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: false
