name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/removebg
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Compute source tarball sha256 (for Homebrew tap)
        id: sha
        run: |
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          for i in 1 2 3 4 5; do
            if curl -fsSL "$url" -o /tmp/src.tar.gz; then break; fi
            sleep $((i * 2))
          done
          sha=$(sha256sum /tmp/src.tar.gz | awk '{print $1}')
          {
            echo "url=$url"
            echo "sha256=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        run: |
          {
            echo 'body<<EOF'
            echo "## Install"
            echo
            echo '```bash'
            echo "pipx install removebg==${GITHUB_REF_NAME#v}"
            echo '```'
            echo
            echo "or via plain pip:"
            echo
            echo '```bash'
            echo "pip install removebg==${GITHUB_REF_NAME#v}"
            echo '```'
            echo
            echo "## Homebrew tap (alternative, parked)"
            echo
            echo "If you maintain the Homebrew tap, update \`Formula/removebg.rb\` with:"
            echo
            echo '```ruby'
            echo "  url \"${{ steps.sha.outputs.url }}\""
            echo "  sha256 \"${{ steps.sha.outputs.sha256 }}\""
            echo '```'
            echo "then run \`./packaging/homebrew/generate-resources.sh\`."
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: false
